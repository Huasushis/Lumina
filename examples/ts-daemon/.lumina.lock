        "path": "TaskManager/index.ts",
        "content": "import { LuminaActor } from \"../runtime.ts\";\n\ninterface Task {\n  id: string;\n  payload: string;\n  priority: number;\n  timestamp: number;\n}\n\nfunction generateUUID(): string {\n  return \"xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx\".replace(/[xy]/g, (c) => {\n    const r = (Math.random() * 16) | 0;\n    const v = c === \"x\" ? r : (r & 0x3) | 0x8;\n    return v.toString(16);\n  });\n}\n\nexport class TaskManager extends LuminaActor {\n  private tasks: Task[] = [];\n\n  run(): void {\n    this.tasks = [];\n  }\n\n  invoke(method: string, params: Record<string, unknown>): Record<string, unknown> {\n    switch (method) {\n      case \"submit\":\n        return this.submit(params.payload as string, params.priority as number);\n      case \"list\":\n        return this.list();\n      case \"remove\":\n        return this.remove(params.id as string);\n      default:\n        throw new Error(`Unknown method: ${method}`);\n    }\n  }\n\n  private submit(payload: string, priority: number): { id: string } {\n    const id = generateUUID();\n    this.tasks.push({\n      id,\n      payload,\n      priority,\n      timestamp: Date.now(),\n    });\n    return { id };\n  }\n\n  private list(): { tasks: Array<Record<string, Record<string, string>>> } {\n    const sorted = [...this.tasks].sort((a, b) => {\n      if (b.priority !== a.priority) return b.priority - a.priority;\n      return a.timestamp - b.timestamp;\n    });\n    const tasks = sorted.map((t) => ({\n      [t.id]: {\n        payload: t.payload,\n        priority: String(t.priority),\n        timestamp: String(t.timestamp),\n      },\n    }));\n    return { tasks };\n  }\n\n  private remove(id: string): { ok: string } {\n    const index = this.tasks.findIndex((t) => t.id === id);\n    if (index !== -1) {\n      this.tasks.splice(index, 1);\n    }\n    return { ok: \"true\" };\n  }\n}\n"
      }
    ]
  }
