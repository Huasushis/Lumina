        "path": "taskmanager.ts",
        "content": "import { LuminaActor } from \"../lumina_runtime.ts\";\n\ninterface Task {\n  id: string;\n  payload: string;\n  priority: number;\n  timestamp: string;\n}\n\nexport class TaskManager extends LuminaActor {\n  private tasks: Task[] = [];\n\n  run(): void {\n    this.tasks = [];\n  }\n\n  invoke(method: string, params: Record<string, any>): Record<string, any> {\n    switch (method) {\n      case \"submit\":\n        return this.handleSubmit(String(params.payload), Number(params.priority));\n      case \"list\":\n        return this.handleList();\n      case \"remove\":\n        return this.handleRemove(String(params.id));\n      default:\n        throw new Error(`Unknown method: ${method}`);\n    }\n  }\n\n  private handleSubmit(payload: string, priority: number): { id: string } {\n    const id = crypto.randomUUID();\n    this.tasks.push({\n      id,\n      payload,\n      priority,\n      timestamp: new Date().toISOString(),\n    });\n    return { id };\n  }\n\n  private handleList(): { tasks: Array<Record<string, Record<string, string>>> } {\n    const sorted = [...this.tasks].sort((a, b) => {\n      if (b.priority !== a.priority) return b.priority - a.priority;\n      return a.timestamp.localeCompare(b.timestamp);\n    });\n    return {\n      tasks: sorted.map((t) => ({\n        [t.id]: {\n          payload: t.payload,\n          priority: String(t.priority),\n          timestamp: t.timestamp,\n        },\n      })),\n    };\n  }\n\n  private handleRemove(id: string): { ok: string } {\n    const idx = this.tasks.findIndex((t) => t.id === id);\n    if (idx === -1) return { ok: \"not found\" };\n    this.tasks.splice(idx, 1);\n    return { ok: \"removed\" };\n  }\n}\n"
      }
    ]
  }
}