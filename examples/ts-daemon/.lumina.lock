    "files": [
      {
        "path": "taskmanager.ts",
        "content": "import { LuminaActor } from \"../runtime.ts\";\n\ninterface Task {\n  id: string;\n  payload: string;\n  priority: number;\n  timestamp: number;\n}\n\nexport class TaskManager extends LuminaActor {\n  private tasks: Task[] = [];\n\n  run(): void {\n    this.tasks = [];\n  }\n\n  invoke(method: string, params: Record<string, unknown>): Record<string, unknown> {\n    switch (method) {\n      case \"submit\": {\n        const id = crypto.randomUUID();\n        const task: Task = {\n          id,\n          payload: params.payload as string,\n          priority: params.priority as number,\n          timestamp: Date.now(),\n        };\n        this.tasks.push(task);\n        return { id };\n      }\n      case \"list\": {\n        const sorted = [...this.tasks].sort((a, b) => {\n          if (b.priority !== a.priority) return b.priority - a.priority;\n          return a.timestamp - b.timestamp;\n        });\n        return {\n          tasks: sorted.map((t) => ({\n            id: t.id,\n            payload: t.payload,\n            priority: String(t.priority),\n            timestamp: String(t.timestamp),\n          })),\n        };\n      }\n      case \"remove\": {\n        const targetId = params.id as string;\n        const index = this.tasks.findIndex((t) => t.id === targetId);\n        if (index !== -1) {\n          this.tasks.splice(index, 1);\n          return { ok: \"removed\" };\n        }\n        return { ok: \"not_found\" };\n      }\n      default:\n        throw new Error(`Unknown method: ${method}`);\n    }\n  }\n}\n"
      }
    ]
  }
}