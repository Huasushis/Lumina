      {
        "path": "TaskManager.ts",
        "content": "import { LuminaActor } from \"./LuminaActor\";\n\ninterface Task {\n  id: string;\n  payload: string;\n  priority: number;\n  timestamp: string;\n}\n\nexport class TaskManager extends LuminaActor {\n  private tasks: Task[] = [];\n\n  run(): void {\n    this.tasks = [];\n  }\n\n  invoke(method: string, params: Record<string, unknown>): Record<string, unknown> {\n    switch (method) {\n      case \"submit\":\n        return this.doSubmit(params.payload as string, params.priority as number);\n      case \"list\":\n        return this.doList();\n      case \"remove\":\n        return this.doRemove(params.id as string);\n      default:\n        throw new Error(`TaskManager: unknown method \"${method}\"`);\n    }\n  }\n\n  private doSubmit(payload: string, priority: number): { id: string } {\n    const id = crypto.randomUUID();\n    this.tasks.push({\n      id,\n      payload,\n      priority,\n      timestamp: new Date().toISOString(),\n    });\n    return { id };\n  }\n\n  private doList(): { tasks: Array<Record<string, Record<string, string>>> } {\n    const sorted = [...this.tasks].sort((a, b) => {\n      if (b.priority !== a.priority) return b.priority - a.priority;\n      return a.timestamp.localeCompare(b.timestamp);\n    });\n\n    return {\n      tasks: sorted.map((t) => ({\n        id: { id: t.id },\n        payload: { payload: t.payload },\n        priority: { priority: String(t.priority) },\n        timestamp: { timestamp: t.timestamp },\n      })),\n    };\n  }\n\n  private doRemove(id: string): { ok: string } {\n    const idx = this.tasks.findIndex((t) => t.id === id);\n    if (idx === -1) return { ok: \"false\" };\n    this.tasks.splice(idx, 1);\n    return { ok: \"true\" };\n  }\n}\n"
      }
    ]
  }
}