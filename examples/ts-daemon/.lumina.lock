  "TaskManager": {
    "hash": "09a833b16ffa32af98eda49df3a4124ae24383cc41bea14b2b2727155c1ae609",
    "files": [
      {
        "path": "TaskManager.ts",
        "content": "import { LuminaActor } from \"../../runtime/LuminaActor.ts\";\nimport { randomUUID } from \"node:crypto\";\n\ninterface Task {\n  id: string;\n  payload: string;\n  priority: number;\n  timestamp: string;\n}\n\nexport class TaskManager extends LuminaActor {\n  private tasks: Task[] = [];\n\n  run(): void {\n    this.tasks = [];\n  }\n\n  invoke(method: string, params: Record<string, unknown>): Record<string, unknown> {\n    switch (method) {\n      case \"submit\":\n        return this.handleSubmit(params);\n      case \"list\":\n        return this.handleList();\n      case \"remove\":\n        return this.handleRemove(params);\n      default:\n        throw new Error(`Unknown method: ${method}`);\n    }\n  }\n\n  private handleSubmit(params: Record<string, unknown>): { id: string } {\n    const payload = params.payload as string;\n    const priority = params.priority as number;\n    const task: Task = {\n      id: randomUUID(),\n      payload,\n      priority,\n      timestamp: new Date().toISOString(),\n    };\n    this.tasks.push(task);\n    return { id: task.id };\n  }\n\n  private handleList(): { tasks: Array<Record<string, string>> } {\n    const sorted = [...this.tasks].sort((a, b) => {\n      if (b.priority !== a.priority) return b.priority - a.priority;\n      return a.timestamp.localeCompare(b.timestamp);\n    });\n    return {\n      tasks: sorted.map((t) => ({\n        id: t.id,\n        payload: t.payload,\n        priority: String(t.priority),\n        timestamp: t.timestamp,\n      })),\n    };\n  }\n\n  private handleRemove(params: Record<string, unknown>): { ok: string } {\n    const id = params.id as string;\n    const index = this.tasks.findIndex((t) => t.id === id);\n    if (index === -1) {\n      return { ok: \"not found\" };\n    }\n    this.tasks.splice(index, 1);\n    return { ok: \"removed\" };\n  }\n}\n"
      }
    ]
  }
}