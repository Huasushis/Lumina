  "TaskManager": {
    "hash": "09a833b16ffa32af98eda49df3a4124ae24383cc41bea14b2b2727155c1ae609",
    "files": [
      {
        "path": "taskmanager.ts",
        "content": "import { LuminaActor } from \"../runtime.ts\";\n\ninterface Task {\n  id: string;\n  payload: string;\n  priority: number;\n  timestamp: number;\n}\n\nexport class TaskManager extends LuminaActor {\n  private tasks: Task[] = [];\n\n  run(): void {\n    this.tasks = [];\n  }\n\n  invoke(method: string, params: Record<string, any>): Record<string, any> {\n    switch (method) {\n      case \"submit\": {\n        const task: Task = {\n          id: crypto.randomUUID(),\n          payload: params.payload,\n          priority: params.priority,\n          timestamp: Date.now(),\n        };\n        this.tasks.push(task);\n        return { id: task.id };\n      }\n      case \"list\": {\n        const sorted = [...this.tasks].sort((a, b) => {\n          if (a.priority !== b.priority) return b.priority - a.priority;\n          return a.timestamp - b.timestamp;\n        });\n        return {\n          tasks: sorted.map((t) => ({\n            id: String(t.id),\n            payload: String(t.payload),\n            priority: String(t.priority),\n            timestamp: String(t.timestamp),\n          })),\n        };\n      }\n      case \"remove\": {\n        const idx = this.tasks.findIndex((t) => t.id === params.id);\n        if (idx === -1) return { ok: \"not_found\" };\n        this.tasks.splice(idx, 1);\n        return { ok: \"removed\" };\n      }\n      default:\n        throw new Error(`TaskManager: unknown method \"${method}\"`);\n    }\n  }\n}\n"
      }
    ]
  }
}