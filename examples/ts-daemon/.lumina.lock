        "path": "taskmanager.ts",
        "content": "import { LuminaActor } from \"../runtime.ts\";\n\ninterface Task {\n  id: string;\n  payload: string;\n  priority: number;\n  timestamp: string;\n}\n\nexport class TaskManager extends LuminaActor {\n  private tasks: Task[] = [];\n\n  run(): void {\n    this.tasks = [];\n  }\n\n  invoke(method: string, params: Record<string, unknown>): Record<string, unknown> {\n    switch (method) {\n      case \"submit\":\n        return this.handleSubmit(params as { payload: string; priority: number });\n      case \"list\":\n        return this.handleList();\n      case \"remove\":\n        return this.handleRemove(params as { id: string });\n      default:\n        throw new Error(`Unknown method: ${method}`);\n    }\n  }\n\n  private handleSubmit(params: { payload: string; priority: number }): { id: string } {\n    const task: Task = {\n      id: crypto.randomUUID(),\n      payload: params.payload,\n      priority: params.priority,\n      timestamp: new Date().toISOString(),\n    };\n    this.tasks.push(task);\n    return { id: task.id };\n  }\n\n  private handleList(): { tasks: Array<Record<string, string>> } {\n    const sorted = [...this.tasks].sort((a, b) => {\n      if (b.priority !== a.priority) return b.priority - a.priority;\n      return a.timestamp.localeCompare(b.timestamp);\n    });\n    return {\n      tasks: sorted.map((t) => ({\n        id: t.id,\n        payload: t.payload,\n        priority: String(t.priority),\n        timestamp: t.timestamp,\n      })),\n    };\n  }\n\n  private handleRemove(params: { id: string }): { ok: string } {\n    const index = this.tasks.findIndex((t) => t.id === params.id);\n    if (index === -1) {\n      return { ok: `Task ${params.id} not found` };\n    }\n    this.tasks.splice(index, 1);\n    return { ok: `Task ${params.id} removed` };\n  }\n}\n"
      }
    ]
  }
}