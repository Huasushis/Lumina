{
  "GameUI": {
    "hash": "ce623a8e7185cb71f17e06a922d078f8acaf52df967be6fe79278da46aac756b",
    "files": [
      {
        "path": "game_ui.py",
        "content": "from _runtime.lumina_actor import LuminaActor\n\n\nclass GameUI(LuminaActor):\n    def run(self) -> None:\n        self.config = {\"min\": 1, \"max\": 100, \"max_attempts\": 7}\n        self.attempts = 0\n        self.send_message(\"engine\", \"reset\", {\"config\": self.config})\n        print(f\"Welcome to the Number Guessing Game!\")\n        print(f\"I'm thinking of a number between {self.config['min']} and {self.config['max']}.\")\n        print(f\"You have {self.config['max_attempts']} attempts. Good luck!\")\n\n    def invoke(self, method: str, params: dict) -> dict:\n        if method == \"submit_guess\":\n            value = params[\"value\"]\n            self.attempts += 1\n\n            response = self.send_message(\"engine\", \"guess\", {\n                \"guess\": {\n                    \"value\": value,\n                    \"attempt\": self.attempts\n                }\n            })\n\n            result = response[\"result\"]\n            hint = result[\"hint\"]\n            attempts = result[\"attempts\"]\n            max_attempts = result[\"max_attempts\"]\n            won = result[\"won\"]\n\n            print(f\"Attempt {attempts}: You guessed {value}.\")\n\n            if won:\n                print(f\"Congratulations! You won in {attempts} attempt(s)!\")\n            elif hint == \"game_over\":\n                print(f\"Out of attempts! The game is over.\")\n            else:\n                print(f\"Hint: {hint}\")\n                print(f\"Attempts remaining: {max_attempts - attempts}\")\n\n            return {\n                \"result\": {\n                    \"hint\": hint,\n                    \"attempts\": attempts,\n                    \"max_attempts\": max_attempts,\n                    \"won\": won\n                }\n            }\n\n        elif method == \"new_game\":\n            config = params[\"config\"]\n            self.config = config\n            self.attempts = 0\n\n            self.send_message(\"engine\", \"reset\", {\"config\": config})\n\n            print(f\"\\n--- New Game ---\")\n            print(f\"Guess a number between {config['min']} and {config['max']}.\")\n            print(f\"You have {config['max_attempts']} attempts. Good luck!\")\n\n            return {\"ok\": \"New game started\"}\n\n        else:\n            raise NotImplementedError(f\"Unknown method: {method}\")\n"
      }
    ]
  },
  "DecisionEngine": {
    "hash": "22baa9b0981d4228edcebe493c95c77f9e2c83b9c26d4962b872a0ec1b89d652",
    "files": [
      {
        "path": "decision_engine.py",
        "content": "import random\n\nfrom _runtime.lumina_actor import LuminaActor\n\n\nclass DecisionEngine(LuminaActor):\n    def run(self) -> None:\n        self.min_val = 1\n        self.max_val = 100\n        self.max_attempts = 10\n        self.secret = random.randint(self.min_val, self.max_val)\n        self.attempts = 0\n\n    def invoke(self, method: str, params: dict) -> dict:\n        if method == \"guess\":\n            guess = params[\"guess\"]\n            value = guess[\"value\"]\n            self.attempts += 1\n\n            if self.attempts > self.max_attempts:\n                return {\n                    \"result\": {\n                        \"hint\": \"game_over\",\n                        \"attempts\": self.attempts - 1,\n                        \"max_attempts\": self.max_attempts,\n                        \"won\": False\n                    }\n                }\n\n            if value < self.secret:\n                hint = \"higher\"\n                won = False\n            elif value > self.secret:\n                hint = \"lower\"\n                won = False\n            else:\n                hint = \"correct\"\n                won = True\n\n            return {\n                \"result\": {\n                    \"hint\": hint,\n                    \"attempts\": self.attempts,\n                    \"max_attempts\": self.max_attempts,\n                    \"won\": won\n                }\n            }\n\n        elif method == \"reset\":\n            config = params[\"config\"]\n            self.min_val = config[\"min\"]\n            self.max_val = config[\"max\"]\n            self.max_attempts = config[\"max_attempts\"]\n            self.secret = random.randint(self.min_val, self.max_val)\n            self.attempts = 0\n            return {\"ok\": \"reset_complete\"}\n\n        else:\n            raise NotImplementedError(f\"Unknown method: {method}\")\n"
      }
    ]
  }
}