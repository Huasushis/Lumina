{
  "DecisionEngine": {
    "hash": "22baa9b0981d4228edcebe493c95c77f9e2c83b9c26d4962b872a0ec1b89d652",
    "files": [
      {
        "path": "decisionengine.py",
        "content": "import random\n\nfrom lumina import LuminaActor\n\n\nclass DecisionEngine(LuminaActor):\n    def run(self):\n        self._min = 1\n        self._max = 100\n        self._max_attempts = 7\n        self._secret = random.randint(self._min, self._max)\n        self._attempts = 0\n\n    def invoke(self, method: str, params: dict) -> dict:\n        if method == \"guess\":\n            return self._handle_guess(params[\"guess\"])\n        if method == \"reset\":\n            return self._handle_reset(params[\"config\"])\n        raise ValueError(f\"Unknown method: {method}\")\n\n    def _handle_guess(self, guess: dict) -> dict:\n        value = guess[\"value\"]\n\n        if self._attempts >= self._max_attempts:\n            return {\n                \"result\": {\n                    \"hint\": \"game over\",\n                    \"attempts\": self._attempts,\n                    \"max_attempts\": self._max_attempts,\n                    \"won\": False,\n                }\n            }\n\n        self._attempts += 1\n\n        if value == self._secret:\n            return {\n                \"result\": {\n                    \"hint\": \"correct\",\n                    \"attempts\": self._attempts,\n                    \"max_attempts\": self._max_attempts,\n                    \"won\": True,\n                }\n            }\n\n        hint = \"higher\" if value < self._secret else \"lower\"\n        return {\n            \"result\": {\n                \"hint\": hint,\n                \"attempts\": self._attempts,\n                \"max_attempts\": self._max_attempts,\n                \"won\": False,\n            }\n        }\n\n    def _handle_reset(self, config: dict) -> dict:\n        self._min = config[\"min\"]\n        self._max = config[\"max\"]\n        self._max_attempts = config[\"max_attempts\"]\n        self._secret = random.randint(self._min, self._max)\n        self._attempts = 0\n        return {\"ok\": \"game reset\"}\n"
      }
    ]
  },
  "GameUI": {
    "hash": "0f1adbe52237f3867940f63abd6c6bf6a98b2c5fc3413b3097c367e3b4a8d8a6",
    "files": [
      {
        "path": "gameui.py",
        "content": "from lumina import LuminaActor\n\n\nclass GameUI(LuminaActor):\n    def run(self):\n        config = {\"min\": 1, \"max\": 100, \"max_attempts\": 7}\n        self._config = config\n        self._attempt_count = 0\n        print(\n            f\"Welcome to Guess the Number!\\n\"\n            f\"I'm thinking of a number between {config['min']} and {config['max']}.\\n\"\n            f\"You have {config['max_attempts']} attempts.\"\n        )\n        self.send_message(\"engine\", \"reset\", {\"config\": config})\n\n    def invoke(self, method: str, params: dict) -> dict:\n        if method == \"submit_guess\":\n            return self._handle_submit_guess(params)\n        if method == \"new_game\":\n            return self._handle_new_game(params)\n        raise ValueError(f\"Unknown method: {method}\")\n\n    def _handle_submit_guess(self, params: dict) -> dict:\n        self._attempt_count += 1\n        guess = {\"value\": params[\"value\"], \"attempt\": self._attempt_count}\n        response = self.send_message(\"engine\", \"guess\", {\"guess\": guess})\n        result = response[\"result\"]\n\n        if result[\"won\"]:\n            print(f\"Congratulations! You guessed it in {result['attempts']} attempts!\")\n        elif result[\"attempts\"] >= result[\"max_attempts\"]:\n            print(f\"Game over! You've used all {result['max_attempts']} attempts.\")\n        else:\n            print(f\"Hint: {result['hint']}\")\n\n        return {\"result\": result}\n\n    def _handle_new_game(self, params: dict) -> dict:\n        config = params[\"config\"]\n        self._config = config\n        self._attempt_count = 0\n        response = self.send_message(\"engine\", \"reset\", {\"config\": config})\n        print(\n            f\"New game! Guess a number between {config['min']} and {config['max']}. \"\n            f\"You have {config['max_attempts']} attempts.\"\n        )\n        return response\n"
      }
    ]
  }
}